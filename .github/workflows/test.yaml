name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1

      - name: Install LuaUnit
        run: |
          curl -sL https://raw.githubusercontent.com/bluebird75/luaunit/master/luaunit.lua -o luaunit.lua
          sudo mkdir -p /usr/local/share/lua/5.1
          sudo mv luaunit.lua /usr/local/share/lua/5.1/luaunit.lua

      - name: Run tests
        run: lua5.1 tests/all.lua
