name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.2"

      - name: Setup Luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install LuaUnit
        run: luarocks install luaunit

      - name: Run tests
        run: lua tests/all.lua
